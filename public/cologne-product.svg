<svg viewBox="0 0 500 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="300" fill="#000"/>
  <defs>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow-c)" stroke="white" fill="none">
    <!-- Left bottle - square/rectangular -->
    <rect x="72" y="26" width="30" height="18" rx="3" stroke-width="2"/>
    <rect x="78" y="19" width="18" height="9" rx="2" stroke-width="1.8"/>
    <rect x="82" y="13" width="10" height="8" rx="1.5" stroke-width="1.5"/>
    <rect x="65" y="44" width="44" height="16" rx="3" stroke-width="2"/>
