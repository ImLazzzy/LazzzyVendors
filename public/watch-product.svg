<svg viewBox="0 0 500 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="300" fill="#000"/>
  <defs>
    <filter id="glow-w">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow-w)" stroke="white" fill="none">
    <!-- LEFT watch - Santos square style -->
    <rect x="30" y="38" width="26" height="22" rx="4" stroke-width="1.8"/>
    <rect x="18" y="58" width="50" height="50" rx="10" stroke-width="2.2"/>
    <rect x="24" y="64" width="38" height="38" rx="7" stroke-width="1.2" opacity="0.4"/>
    <rect x="68" y="72" width="10" height="14" rx="4" stroke-width="1.8"/>
    <!-- Screws on bezel -->
    <circle cx="22" cy="62" r="2.5" stroke-width="1.2"/>
    <circle cx="64" cy="62" r="2.5" stroke-width="1.2"/>
    <circle cx="22" cy="104" r="2.5" stroke-width="1.2"/>
    <circle cx="64" cy="104" r="2.5" stroke-width="1.2"/>
    <!-- Hands -->
    <line x1="43" y1="83" x2="43" y2="73" stroke-width="2" stroke-linecap="round"/>
    <line x1="43" y1="83" x2="52" y2="80" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="43" cy="83" r="2.5" fill="white"/>
    <!-- Roman numerals hint -->
    <line x1="43" y1="67" x2="43" y2="70" stroke-width="1.5"/>
    <line x1="43" y1="96" x2="43" y2="99" stroke-width="1.5"/>
    <line x1="57" y1="83" x2="60" y2="83" stroke-width="1.5"/>
    <line x1="26" y1="83" x2="29" y2="83" stroke-width="1.5"/>
    <!-- Bottom strap -->
    <rect x="30" y="108" width="26" height="22" rx="4" stroke-width="1.8"/>
    <line x1="34" y1="114" x2="52" y2="114" stroke-width="1" opacity="0.4"/>
    <line x1="34" y1="120" x2="52" y2="120" stroke-width="1" opacity="0.4"/>

    <!-- CENTER watch - AP Royal Oak iced out (tallest, prominent) -->
    <rect x="196" y="22" width="32" height="28" rx="5" stroke-width="2"/>
    <rect x="176" y="48" width="72" height="72" rx="14" stroke-width="2.5"/>
    <!-- Octagonal bezel detail -->
    <rect x="182" y="54" width="60" height="60" rx="10" stroke-width="1.5" opacity="0.5"/>
    <rect x="186" y="58" width="52" height="52" rx="8" stroke-width="1" opacity="0.35"/>
    <!-- Diamond iced bezel dots -->
    {Array.from({length: 8}).map((_, i) => {
      const angle = i * 45 * Math.PI / 180;
      const r = 33;
      return null;
    })}
    <circle cx="212" cy="55" r="2" stroke-width="1.2"/>
    <circle cx="226" cy="55" r="2" stroke-width="1.2"/>
    <circle cx="240" cy="55" r="2" stroke-width="1.2"/>
    <circle cx="246" cy="68" r="2" stroke-width="1.2"/>
    <circle cx="246" cy="82" r="2" stroke-width="1.2"/>
    <circle cx="240" cy="109" r="2" stroke-width="1.2"/>
    <circle cx="226" cy="109" r="2" stroke-width="1.2"/>
    <circle cx="212" cy="109" r="2" stroke-width="1.2"/>
    <circle cx="178" cy="68" r="2" stroke-width="1.2"/>
    <circle cx="178" cy="82" r="2" stroke-width="1.2"/>
    <rect x="248" y="75" width="12" height="16" rx="5" stroke-width="1.8"/>
    <!-- Dial hour markers all around -->
    <line x1="212" y1="62" x2="212" y2="65" stroke-width="1.5"/>
    <line x1="220" y1="60" x2="220" y2="63" stroke-width="1.5"/>
    <line x1="228" y1="60" x2="228" y2="63" stroke-width="1.5"/>
    <line x1="236" y1="62" x2="236" y2="65" stroke-width="1.5"/>
    <line x1="241" y1="84" x2="244" y2="84" stroke-width="1.5"/>
    <line x1="241" y1="84" x2="244" y2="84" stroke-width="1.5"/>
    <!-- Hands -->
    <line x1="212" y1="84" x2="212" y2="68" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="212" y1="84" x2="228" y2="78" stroke-width="2" stroke-linecap="round"/>
    <circle cx="212" cy="84" r="3" fill="white"/>
    <!-- Bottom strap -->
    <rect x="196" y="120" width="32" height="28" rx="5" stroke-width="2"/>
    <line x1="200" y1="128" x2="224" y2="128" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="134" x2="224" y2="134" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="140" x2="224" y2="140" stroke-width="1" opacity="0.4"/>

    <!-- RIGHT watch - Nautilus style -->
    <rect x="368" y="38" width="26" height="22" rx="4" stroke-width="1.8"/>
    <rect x="354" y="58" width="54" height="50" rx="12" stroke-width="2.2"/>
    <!-- Integrated bracelet hint -->
    <rect x="356" y="64" width="50" height="38" rx="9" stroke-width="1.2" opacity="0.4"/>
    <rect x="408" y="72" width="10" height="14" rx="4" stroke-width="1.8"/>
    <!-- Horizontal lines on dial (Nautilus signature) -->
    <line x1="360" y1="72" x2="404" y2="72" stroke-width="0.8" opacity="0.45"/>
    <line x1="360" y1="77" x2="404" y2="77" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="82" x2="404" y2="82" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="87" x2="404" y2="87" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="92" x2="404" y2="92" stroke-width="0.8" opacity="0.4"/>
    <line x1="360" y1="97" x2="404" y2="97" stroke-width="0.8" opacity="0.4"/>
    <!-- Hands -->
    <line x1="381" y1="83" x2="381" y2="71" stroke-width="2" stroke-linecap="round"/>
    <line x1="381" y1="83" x2="392" y2="79" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="381" cy="83" r="2.5" fill="white"/>
    <!-- Hour markers -->
    <line x1="381" y1="65" x2="381" y2="68" stroke-width="1.5"/>
    <line x1="381" y1="98" x2="381" y2="101" stroke-width="1.5"/>
    <line x1="396" y1="83" x2="399" y2="83" stroke-width="1.5"/>
    <line x1="363" y1="83" x2="366" y2="83" stroke-width="1.5"/>
    <!-- Bottom strap -->
    <rect x="368" y="108" width="26" height="22" rx="4" stroke-width="1.8"/>
    <line x1="372" y1="114" x2="390" y2="114" stroke-width="1" opacity="0.4"/>
    <line x1="372" y1="120" x2="390" y2="120" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
