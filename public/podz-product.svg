<svg viewBox="0 0 500 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="300" fill="#000"/>
  <defs>
    <filter id="glow-p">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow-p)" stroke="white" fill="none">
    <!-- Case body bottom half -->
    <path d="M148 162 Q148 240 250 242 Q352 240 352 162 L352 155 L148 155 Z" stroke-width="2.5"/>
    <!-- Case lid open -->
    <path d="M148 155 Q148 108 250 105 Q352 108 352 155" stroke-width="2.5"/>
    <!-- Lid inner curve -->
    <path d="M160 155 Q160 118 250 116 Q340 118 340 155" stroke-width="1.2" opacity="0.4"/>
    <!-- Hinge line -->
    <line x1="148" y1="155" x2="352" y2="155" stroke-width="1.5" opacity="0.5"/>
    <!-- Left earbud in case -->
    <ellipse cx="197" cy="190" rx="32" ry="36" stroke-width="2"/>
    <ellipse cx="197" cy="183" rx="14" ry="14" stroke-width="1.8"/>
    <rect x="186" y="169" width="22" height="8" rx="4" stroke-width="1.5"/>
    <ellipse cx="197" cy="165" rx="8" ry="5" stroke-width="1.2" opacity="0.5"/>
    <!-- Right earbud in case -->
    <ellipse cx="303" cy="190" rx="32" ry="36" stroke-width="2"/>
    <ellipse cx="303" cy="183" rx="14" ry="14" stroke-width="1.8"/>
    <rect x="292" y="169" width="22" height="8" rx="4" stroke-width="1.5"/>
    <ellipse cx="303" cy="165" rx="8" ry="5" stroke-width="1.2" opacity="0.5"/>
    <!-- Center divider -->
    <line x1="250" y1="158" x2="250" y2="238" stroke-width="1.2" opacity="0.35"/>
    <!-- Lightning port -->
    <rect x="234" y="237" width="32" height="7" rx="3" stroke-width="1.5"/>
    <!-- LED dot -->
    <circle cx="250" cy="172" r="4" stroke-width="1.5"/>
    <!-- Status indicator glow -->
    <circle cx="250" cy="172" r="7" stroke-width="0.8" opacity="0.3"/>
    <!-- Lid logo hint -->
    <circle cx="250" cy="132" r="12" stroke-width="1" opacity="0.3"/>
    <line x1="250" y1="120" x2="250" y2="144" stroke-width="0.8" opacity="0.25"/>
    <line x1="238" y1="132" x2="262" y2="132" stroke-width="0.8" opacity="0.25"/>
  </g>
</svg>
