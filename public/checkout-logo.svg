<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f0d"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="80" rx="10" fill="url(#bg)"/>
  <!-- Left neon ring logo mark -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#4ade80" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="40" cy="40" r="21" fill="none" stroke="#4ade80" stroke-width="0.8" opacity="0.3"/>
  <text x="40" y="46" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#4ade80" filter="url(#glow)" letter-spacing="-0.5">LV</text>
  <!-- Brand name -->
  <text x="82" y="36" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#4ade80" filter="url(#glow)" letter-spacing="-0.5">Lazzzy</text>
  <text x="82" y="63" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#ffffff" letter-spacing="0">Vendors</text>
  <!-- Right tagline -->
  <text x="390" y="37" text-anchor="end" font-family="Courier New, monospace" font-size="9" fill="#4ade80" opacity="0.7" letter-spacing="1.5">RESELLER SUPPLIERS</text>
  <text x="390" y="52" text-anchor="end" font-family="Courier New, monospace" font-size="9" fill="#6b7280" letter-spacing="1">INSTANT DELIVERY</text>
  <!-- Bottom accent line -->
  <rect x="20" y="74" width="360" height="1.5" rx="1" fill="#4ade80" opacity="0.2"/>
</svg>
