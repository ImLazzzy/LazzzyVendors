<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <!-- Deep black bg -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#020f02"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Neon green center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#00ff41" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <!-- Top glow burst -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <!-- Green text gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="100%" stop-color="#00b32c"/>
    </linearGradient>
    <!-- Horizontal fade for lines -->
    <linearGradient id="lineFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ff41" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00ff41" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <!-- Neon glow filter -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow filter -->
    <filter id="softNeon" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circ">
      <circle cx="500" cy="500" r="500"/>
    </clipPath>
  </defs>

  <!-- Black base -->
  <circle cx="500" cy="500" r="500" fill="url(#bg)"/>

  <!-- Center glow -->
  <circle cx="500" cy="500" r="500" fill="url(#centerGlow)"/>

  <!-- Top burst glow -->
  <circle cx="500" cy="500" r="500" fill="url(#topGlow)"/>

  <!-- Outer neon ring -->
  <circle cx="500" cy="500" r="476" fill="none" stroke="#00ff41" stroke-width="4" opacity="0.9" filter="url(#neon)"/>

  <!-- Second inner ring -->
  <circle cx="500" cy="500" r="458" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>

  <!-- Diagonal slash accent top-left -->
  <line x1="120" y1="280" x2="300" y2="140" stroke="#00ff41" stroke-width="2" opacity="0.4"/>
  <line x1="130" y1="310" x2="310" y2="170" stroke="#00ff41" stroke-width="1" opacity="0.2"/>

  <!-- Diagonal slash accent bottom-right -->
  <line x1="700" y1="860" x2="880" y2="720" stroke="#00ff41" stroke-width="2" opacity="0.4"/>
  <line x1="690" y1="830" x2="870" y2="690" stroke="#00ff41" stroke-width="1" opacity="0.2"/>

  <!-- Big green filled arc behind text — bottom half -->
  <path d="M 80 500 A 420 420 0 0 0 920 500 L 920 600 A 420 280 0 0 1 80 600 Z" fill="#00ff41" opacity="0.04"/>

  <!-- Horizontal separator lines -->
  <rect x="150" y="372" width="700" height="3" rx="1.5" fill="url(#lineFade)"/>
  <rect x="150" y="628" width="700" height="3" rx="1.5" fill="url(#lineFade)"/>

  <!-- GREEN FILLED block behind VENDORS -->
  <rect x="100" y="540" width="800" height="120" rx="0" fill="#00ff41" opacity="0.08"/>

  <!-- Corner brackets top-left -->
  <path d="M 160 200 L 160 260 L 220 260" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.7"/>
  <!-- Corner brackets top-right -->
  <path d="M 840 200 L 840 260 L 780 260" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.7"/>
  <!-- Corner brackets bottom-left -->
  <path d="M 160 800 L 160 740 L 220 740" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.7"/>
  <!-- Corner brackets bottom-right -->
  <path d="M 840 800 L 840 740 L 780 740" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.7"/>

  <!-- Top label -->
  <text
    x="500" y="350"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="26"
    fill="#00ff41"
    opacity="0.8"
    letter-spacing="10"
    filter="url(#softNeon)"
  >◆ OFFICIAL ◆</text>

  <!-- LAZZZY — neon green bold -->
  <text
    x="500" y="510"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Impact, sans-serif"
    font-size="152"
    font-weight="900"
    fill="url(#greenGrad)"
    filter="url(#neon)"
    letter-spacing="-3"
  >LAZZZY</text>

  <!-- VENDORS — white bold -->
  <text
    x="500" y="640"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Impact, sans-serif"
    font-size="152"
    font-weight="900"
    fill="#ffffff"
    filter="url(#softNeon)"
    letter-spacing="0"
  >VENDORS</text>

  <!-- Bottom label -->
  <text
    x="500" y="730"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="24"
    fill="#00ff41"
    opacity="0.7"
    letter-spacing="8"
    filter="url(#softNeon)"
  >RESELLER SUPPLIERS</text>

  <!-- Dot row -->
  <circle cx="430" cy="778" r="3.5" fill="#00ff41" opacity="0.4"/>
  <circle cx="460" cy="778" r="3.5" fill="#00ff41" opacity="0.5"/>
  <circle cx="490" cy="778" r="3.5" fill="#00ff41" opacity="0.6"/>
  <circle cx="500" cy="778" r="5" fill="#00ff41" opacity="1" filter="url(#softNeon)"/>
  <circle cx="510" cy="778" r="3.5" fill="#00ff41" opacity="0.6"/>
  <circle cx="540" cy="778" r="3.5" fill="#00ff41" opacity="0.5"/>
  <circle cx="570" cy="778" r="3.5" fill="#00ff41" opacity="0.4"/>

</svg>
